<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesley Fitness</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#FFF8EE;
color:#5D534A;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
}

.hero-banner{
background:linear-gradient(135deg,#DCC7AA,#FFF8EE);
border-radius:25px;
padding:40px 20px;
margin-bottom:25px;
border:1px solid #F2E9DC;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.hero-content{
text-align:center;
}

.hero-icon{
font-size:70px;
margin-bottom:10px;
}

.hero-banner h1{
font-size:2.5rem;
color:#8A6F5A;
margin-bottom:10px;
}

.hero-banner p{
color:#A08B7A;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-bottom:20px;
}

.stat-card{
background:#FFFCF7;
padding:20px;
border-radius:18px;
border:1px solid #F2E9DC;
text-align:center;
box-shadow:0 8px 25px rgba(148,127,107,.08);
}

.stat-number{
font-size:30px;
font-weight:bold;
color:#B88E68;
}

.card{
background:#FFFCF7;
border:1px solid #F2E9DC;
border-radius:20px;
padding:25px;
margin-bottom:20px;
box-shadow:0 8px 25px rgba(148,127,107,.08);
}

.card h2{
color:#9C7B63;
margin-bottom:15px;
}

input,
select{
width:100%;
height:54px;
padding:0 15px;
margin-bottom:12px;
border-radius:12px;
border:1px solid #E8DDD0;
background:#FFFDF8;
font-size:15px;
}

button{
width:100%;
height:54px;
border:none;
border-radius:12px;
background:#C9A27E;
color:white;
font-size:15px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#B88E68;
}

.record{
background:#FAF3EA;
padding:12px;
margin-top:10px;
border-radius:10px;
border-left:4px solid #C9A27E;
}

@media(max-width:768px){
.stats{
grid-template-columns:1fr;
}
}
</style>
</head>

<body>

<div class="container">

<div class="hero-banner">
<div class="hero-content">
<div class="hero-icon">🏋️‍♂️</div>
<h1>Lesley Fitness</h1>
<p>飲食管理 × 健身追蹤 × 健康生活</p>
</div>
</div>

<div class="stats">

<div class="stat-card">
<div class="stat-number" id="totalCalories">0</div>
<div>今日熱量</div>
</div>

<div class="stat-card">
<div class="stat-number" id="weightDisplay">0</div>
<div>目前體重</div>
</div>

<div class="stat-card">
<div class="stat-number" id="streak">0</div>
<div>連續打卡</div>
</div>

</div>

<div class="card">

<h2>👤 會員資料</h2>

<input id="memberName" placeholder="會員姓名">

<select>
<option>選擇健身目標</option>
<option>減脂</option>
<option>增肌</option>
<option>體態雕塑</option>
<option>健康維持</option>
</select>

</div>

<div class="card">

<h2>🍱 飲食紀錄</h2>

<input id="foodName" placeholder="食物名稱">

<input id="calories" type="number" placeholder="熱量 (kcal)">

<button onclick="addMeal()">
儲存飲食紀錄
</button>

<div id="mealList"></div>

</div>

<div class="card">

<h2>💪 健身課表</h2>

<select>

<option>選擇今日課表</option>
<option>上肢訓練</option>
<option>下肢訓練</option>
<option>胸肌訓練</option>
<option>背肌訓練</option>
<option>肩膀訓練</option>
<option>手臂訓練</option>
<option>腿部訓練</option>
<option>核心訓練</option>
<option>全身循環訓練</option>

</select>

<input placeholder="訓練動作">

<input type="number" placeholder="組數">

<input type="number" placeholder="次數">

<button>
完成今日訓練
</button>

</div>

<div class="card">

<h2>⚖️ 體重追蹤</h2>

<input
id="weight"
type="number"
step="0.1"
placeholder="目前體重 (kg)">

<button onclick="saveWeight()">
儲存體重
</button>

<div id="weightList"></div>

</div>

<div class="card">

<h2>📅 每日打卡</h2>

<button onclick="dailyCheckin()">
今日打卡
</button>

<div id="checkinList"></div>

<br><br>

<button onclick="submitAll()">
送出今日紀錄
</button>

</div>

</div>

<script>

let totalCalories = 0;
let streak = 0;

function addMeal(){

const food=document.getElementById("foodName").value;
const calories=Number(document.getElementById("calories").value);

if(!food || !calories){
alert("請輸入食物名稱與熱量");
return;
}

totalCalories += calories;

document.getElementById("totalCalories").innerText=totalCalories;

document.getElementById("mealList").innerHTML += `
<div class="record">
🍽️ ${food} ｜ ${calories} kcal
</div>
`;

document.getElementById("foodName").value="";
document.getElementById("calories").value="";
}

function saveWeight(){

const weight=document.getElementById("weight").value;

if(!weight)return;

document.getElementById("weightDisplay").innerText=weight;

document.getElementById("weightList").innerHTML += `
<div class="record">
⚖️ ${new Date().toLocaleDateString()} ｜ ${weight} kg
</div>
`;

document.getElementById("weight").value="";
}

function dailyCheckin(){

streak++;

document.getElementById("streak").innerText=streak;

document.getElementById("checkinList").innerHTML += `
<div class="record">
✅ ${new Date().toLocaleString()}
</div>
`;

}

function submitAll(){

const memberName=
document.getElementById("memberName").value;

if(!memberName){

alert("請先輸入會員姓名");

return;
}

alert(
`✅ 今日紀錄已送出

會員姓名：${memberName}

感謝您的紀錄，持續保持運動習慣！`
);

}

</script>

</body>

</html>
